        .progress-bar-fill {

            width: 0%;

            height: 12px;

        /* Waveform bars animation */

            gap: 2px;

        .waveform-bar {

            background: rgba(139,95,209,0.5);
            border-radius: 2px;
            animation: none;
            height: 4px;
            transition: height 0.3s;
        }
        .waveform.playing .waveform-bar {
            animation: wave 1.2s ease-in-out infinite;
        }
        .waveform-bar:nth-child(1)  { animation-delay: 0s; }
        .waveform-bar:nth-child(2)  { animation-delay: 0.1s; }
        .waveform-bar:nth-child(3)  { animation-delay: 0.2s; }
        .waveform-bar:nth-child(4)  { animation-delay: 0.3s; }
        .waveform-bar:nth-child(5)  { animation-delay: 0.15s; }
        .waveform-bar:nth-child(6)  { animation-delay: 0.05s; }
        .waveform-bar:nth-child(7)  { animation-delay: 0.25s; }
        .waveform-bar:nth-child(8)  { animation-delay: 0.35s; }
        .waveform-bar:nth-child(9)  { animation-delay: 0.1s; }
        .waveform-bar:nth-child(10) { animation-delay: 0.2s; }
        @keyframes wave {
            0%, 100% { height: 4px; }
            50% { height: 22px; }
        }
        .waveform.playing .waveform-bar:nth-child(odd)  { background: #8b5fd1; }

        .listen-note {

        /* Responsive */

        }
    </style>

<script>
    const articles = [
        {
            slug: "big-ten-championship-2025",
            emoji: "🏀",
            category: "Basketball",
            title: "Madness Starts Here: Inside the Big Ten Championship",
            excerpt: "From the United Center floor to the locker rooms — what Purdue's upset of Michigan taught us about winning in March.",
            date: "Mar. 17, 2026",
            author: "Katherine Silva and Ryan Hinske",
            isPodcastArticle: true,
            body: `<!-- rendered by JS -->`
        },
        { 
            slug: "washington-post-sports-desk",
            emoji: "📰", category: "Media", title: "In Memoriam for the Washington Post Sports Desk",
            excerpt: "The eulogy given by a kid who grew up on the Post.",
            date: "Feb. 13, 2026", author: "Khuyen Dinh",
            body: `
            <p style='font-style: italic; font-size: 1.2rem; color: #b6a0d7; margin-bottom: 2rem;'>The eulogy given by a kid who grew up on the Post</p>
            <p>When I was a sophomore in high school, we had to do some form of literature and/or media analysis in front of the class. I had been immersed in student journalism since I was in the fourth grade — I still have the t-shirt from my elementary school's student news podcast. I'm unsure what news we were breaking other than new lunch items that were introduced in the cafeteria or who won the student council races. But from there, I went to the newspaper, to the yearbook, and again another student newspaper… let's just say I knew exactly what I wanted to do from a young age.</p>
            <p>I have a distinct memory of showing my class of sophomores in Honors English in the school that was built like a prison, the Washington Post's newest motto: Democracy Dies in Darkness. I was amazed at the time, and just so moved at how powerful journalism could be. I can fully admit that I did not even truly understand the depth of that phrase. I was working on my high school's yearbook, as the photo editor so my experience in breaking huge news to society was extremely minimal.</p>
            <p>But I stood in front of everyone and announced that the Washington Post had released this new slogan in 2017. This was the first slogan to be adopted by the Post in its 140-year history. I thought this was genius — and something I could completely believe in and be proud of. Imagine me, a 16-year-old standing in front of a group of her peers who were definitely not listening to me, passionately lecturing them on how important journalism is and how it keeps the country accountable.</p>
            <p>As I got older, I got more specific with my passions. I wanted to cover human interest and sports stories. I loved learning more about people and getting to tell their stories to share with others. I loved the adrenaline rush of being in sports and getting to be on the inside of these cool stories and games.</p>
            <p>I graduated from the University of Virginia with a degree in media stories with a focus on sports media and journalism. I spent my undergraduate days photographing football games, working on the broadcast crew for basketball and analysing 90s cinema and athletes who utilized their platform. After two years in "the real world", I wanted to go back to school. I never knew exactly where I wanted to end up when I was younger. I always envisioned it being back in D.C. but inside the city proper. But in my twenties, I added California to my list of two locations. I think deep down, I always wanted to go back and know that the Post would hopefully be waiting for me.</p>
            <p>When watching interactions between my professor and old co-workers, I failed to realize that one of their connections other than ESPN was the Washington Post. They mourned over the sports desk. I thought back to the day before, where one of my old mentors recommended that I pitch to the sports desk "even though they are shutting down the desk".</p>
            <p>How ironic it is to be at such an exciting event for my career knowing that this industry is slowly decreasing in momentum. But it's not like I was completely unaware. Most everyone I met professionally before rejoining the classroom had been laid off in media. I had one editor that would get a new piercing every time she was laid off due to the monopolization of modern media conglomerates. I'd been laid off too — I remember the day so clearly. I had just returned from taking the day off for my 24th birthday and the entire staff had been summoned to a last minute meeting. The language that was used was so vague and corporate; I knew they were trying to overcomplicate the truth. The truth was that we were all out of jobs after this meeting ended.</p>

        <div class="dialogue-block">
            <div class="dialogue-speaker guest">Matt Painter — Purdue Head Coach</div>
            <p class="dialogue-quote">"Michigan's the Big Ten champs, by the way. We're the tournament champs, right? What you do in 20 games and go 19 and 1 and go 10 and 0 on the road — you've got to give respect."</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker ryan">Ryan Hinske</div>
            <p class="dialogue-text">On the Purdue side, they're in this tiny locker room around a crazy corner I've never seen. The Bulls locker room is so large, the Blackhawks locker room is so large. They're kind of just in this small room that I think was actually two rooms — they just opened the door to the second room.</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker katherine">Katherine Silva</div>
            <p class="dialogue-text">Like a trapdoor?</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker ryan">Ryan Hinske</div>
            <p class="dialogue-text">It was crazy. And they're just sitting there. It definitely seemed like relief — like they had done what they set out to do. The three four-year seniors had just won their third in four years. They didn't win it last year, so they came back saying, let's cap off our college careers. It seemed like a wave of relief. Cluff mentioned playing four games in four days several times.</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker guest">Oscar Cluff — Purdue</div>
            <p class="dialogue-quote">"You know, everyone's tired. It's been a long four days."</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker ryan">Ryan Hinske</div>
            <p class="dialogue-text">Three different players said they were really focused on hoping to play on Friday instead of Thursday — which speaks to just how fatigued they were after four games in four days.</p>
        </div>

        <div class="section-divider"><span>What It Takes to Win in March</span></div>

        <div class="dialogue-block">
            <div class="dialogue-speaker katherine">Katherine Silva</div>
            <p class="dialogue-text">I want to ask you what this means for the NCAA Tournament. How can we use this game to define what a team needs to win it all? Because on either side, this could be good fuel for Michigan.</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker ryan">Ryan Hinske</div>
            <p class="dialogue-text">What I learned from Purdue: it's easier to feel confident in your abilities when there are excellent four-year seniors making you feel confident on the floor.</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker ryan" style="font-style:italic; opacity:0.7;">Ryan Hinske — to Oscar Cluff</div>
            <p class="dialogue-quote">"Oscar, you're on a team with a lot of roster continuity. What does it mean to you to have other seniors that instill that confidence in you to make those late-game plays?"</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker guest">Oscar Cluff — Purdue</div>
            <p class="dialogue-quote">"Yeah, oh no. It's great to have trust in one another. We all trust each other. We all believe in each other to the max."</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker ryan">Ryan Hinske</div>
            <p class="dialogue-text">They were patient through the eight losses. They waited for your moment. When the time was right, they trusted a mid-major transfer to put his body on the line in clutch moments. That speaks to roster continuity in an era where that is rare. Michigan has strong roster construction too, but that familiarity between their players showed its teeth in this game. That would be my concern for them.</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker katherine">Katherine Silva</div>
            <p class="dialogue-text">To your point, it kind of levels out the playing field. You have this amazing chemistry from three four-year seniors — their core three — but then you have a designer-baby-esque roster out of Michigan. The essence of it is: is this loss going to be fuel? And the way Michigan held themselves in the presser, they know the work they need to do. But I also snuck into Purdue's presser while you were in the locker room. Braden Smith said something that I think is the essence of the NCAA Tournament. I asked him how it felt being the seven seed going in and beating the one seed. He was totally unfazed. He said they had been in this position before — that it doesn't matter what number is next to your name. Because you go out there and you make the moment, and you play hard.</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker ryan">Ryan Hinske</div>
            <p class="dialogue-text">I want to wrap up with the underdog mentality. No one's ever had a perfect bracket, and it's because of these upsets — because the favored team loses so often in March. For Purdue, everyone was diving on loose balls. Michigan's bench contested some out-of-bounds calls. But when you're the better team and your coach says slow down — or that's just the mentality — you play without desperation. It's totally natural, and perhaps why more upsets happen in college: it takes more years of experience to unlock that urgency. And when the call doesn't go your way, you're caught flat-footed.</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker katherine">Katherine Silva</div>
            <p class="dialogue-text">It adds up too.</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker ryan">Ryan Hinske</div>
            <p class="dialogue-text">Yeah, and maybe Michigan learned that during this game and can use it to their advantage. I don't think the Zion Williamson Duke team had that. I don't think last year's South Carolina Gamecocks had that wake-up call going in.</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker katherine">Katherine Silva</div>
            <p class="dialogue-text">I think we can both agree that this game captured the essence of March and what that madness truly is. It's poetic that this was the last game before Selection Sunday. It gave us an idea of what our champion is going to look like. What is our champion going to look like, Ryan?</p>
        </div>

        <div class="dialogue-block">
            <div class="dialogue-speaker ryan">Ryan Hinske</div>
            <p class="dialogue-text">It's going to have strong leaders — whether they've been there for a long time or not. They need that gene. Physicality. Playing the game that's being called. The ability to deal with the moment. And a unique level of trust — like what we saw with Oscar Cluff gaining the confidence of the senior leaders over the course of a season. These ideas don't show up in statistics. They're intangible. You can't make a spreadsheet of it. Purdue displayed all of that today, but the lessons Michigan learned may benefit them in the long run. Maybe it gave them a much-needed chip on their shoulder. Only time will tell. March has just begun.</p>
        </div>
        `;
    }

    // ---- ROUTER ----
    function getParams() {
        return new URLSearchParams(window.location.search);
    }

    function route() {
        const params = getParams();
        const page = params.get('page');
        const articleSlug = params.get('article');

        document.getElementById('homePage').style.display = 'none';
        document.getElementById('articlesPage').style.display = 'none';
        document.getElementById('articlePage').style.display = 'none';

        if (articleSlug) {
            const art = articles.find(a => a.slug === articleSlug);
            if (art) { renderArticlePage(art); return; }
        }
        if (page === 'articles') {
            renderArticlesListPage();
            return;
        }
        renderHomePage();
    }

    function renderHomePage() {
        document.getElementById('homePage').style.display = 'block';
        document.title = 'The 303 | Daily Sports Content';

        document.getElementById('previewGrid').innerHTML = articles.slice(0, 4).map(art => `
            <a class="article-card" href="?article=${art.slug}">
                <div class="article-image">${art.emoji}</div>
                <div class="article-content">
                    <div class="article-category">${art.category}</div>
                    <h3 class="article-title">${art.title}</h3>
                    <p class="article-excerpt">${art.excerpt || ''}</p>
                </div>
            </a>
        `).join('');

        document.getElementById('podcastGrid').innerHTML = podcasts.map((pod, idx) => `
            <div class="podcast-card" onclick="openPodcast(${idx})">
                <div class="podcast-icon"><img src="${pod.image}" alt="${pod.title}"></div>
                <h3 class="podcast-title">${pod.title}</h3>
            </div>
        `).join('');

        animateHeroText();
    }

    function renderArticlesListPage() {
        document.getElementById('articlesPage').style.display = 'block';
        document.title = 'Articles | The 303';

        document.getElementById('fullArticlesGrid').innerHTML = articles.map(art => `
            <a class="article-card" href="?article=${art.slug}">
                <div class="article-image">${art.emoji}</div>
                <div class="article-content">
                    <div class="article-category">${art.category}</div>
                    <h3 class="article-title">${art.title}</h3>
                    <p class="article-excerpt">${art.excerpt || ''}</p>
                </div>
            </a>
        `).join('');
    }

    function renderArticlePage(art) {
        document.getElementById('articlePage').style.display = 'block';
        document.title = `${art.title} | The 303`;

        let titleHtml;
        if (art.slug === 'fourth-and-eight-fourth-and-four') {
            titleHtml = `
                <div class="headline-stack">
                    <div class="bg-text">Fourth and Eight</div>
                    <div class="fg-text">Fourth and Four</div>
                </div>`;
        } else {
            titleHtml = `<h2 class="section-title" style="text-align:left; font-size: 2rem; margin-bottom: 0.5rem;">${art.title}</h2>`;
        }

        const bodyContent = art.isPodcastArticle ? buildPodcastBody() : (art.body || `<p>${art.excerpt}</p>`);

        document.getElementById('articlePageContent').innerHTML = `
            ${titleHtml}
            <div style="text-align:center; margin-bottom:2.5rem;">
                <p style="color:#ff6b35; font-weight:bold; text-transform:uppercase; margin-bottom:0.2rem;">
                    ${art.category} | ${art.date}
                </p>
                <p style="color:#b6a0d7; font-style:italic; font-size:0.9rem;">
                    By ${art.author || "The 303 Staff"}
                </p>
            </div>
            <div class="article-full-body">${bodyContent}</div>
        `;

        // Re-sync audio player if duration already known
        if (art.isPodcastArticle && audio.duration) {
            const tot = document.getElementById('totalTime');
            if (tot) tot.textContent = formatTime(audio.duration);
        }

        window.scrollTo(0, 0);
    }

    // ---- PODCASTS ----
    function openPodcast(idx) {
        const pod = podcasts[idx];
        document.getElementById('podcastContent').innerHTML = `
            <div style="display:inline-block; width:150px; height:150px; border-radius:50%; overflow:hidden; margin-bottom:1rem;">
                <img src="${pod.image}" alt="${pod.title}" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <h2 class="section-title">${pod.title}</h2>
            <a href="${pod.link}" target="_blank" class="cta-button">Listen Now</a>
        `;
        document.getElementById('podcastModal').style.display = 'block';
    }
    function closePodcastModal() { document.getElementById('podcastModal').style.display = 'none'; }
    window.onclick = e => { if (e.target.id === 'podcastModal') closePodcastModal(); };

    // ---- NEWSLETTER ----
    function handleSubscribe(e) {
        e.preventDefault();
        document.getElementById('successMessage').classList.add('show');
        e.target.reset();
    }

    // ---- HERO ANIMATION ----
    const words = ["Sports", "Football", "Basketball", "Baseball", "Soccer", "Hockey", "Analytics"];
    let wordIdx = 0, charIdx = 0, isDeleting = false;
    function animateHeroText() {
        const target = document.getElementById("rotate-text");
        if (!target) return;
        const currentWord = words[wordIdx];
        target.textContent = isDeleting ? currentWord.substring(0, charIdx - 1) : currentWord.substring(0, charIdx + 1);
        charIdx = isDeleting ? charIdx - 1 : charIdx + 1;
        let typeSpeed = isDeleting ? 75 : 150;
        if (!isDeleting && charIdx === currentWord.length) { typeSpeed = 2000; isDeleting = true; }
        else if (isDeleting && charIdx === 0) { isDeleting = false; wordIdx = (wordIdx + 1) % words.length; typeSpeed = 500; }
        setTimeout(animateHeroText, typeSpeed);
    }

    window.addEventListener('popstate', route);
    document.addEventListener('DOMContentLoaded', route);
</script>
</body>
</html>
